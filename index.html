<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Property CRM</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0F1117;--bg2:#1A1D27;--bg3:#22263A;--bg4:#2A2F45;
  --border:#2E3350;--border2:#3A4060;
  --text:#F0F2FF;--text2:#8B92B8;--text3:#5A6080;
  --accent:#6C63FF;--accent2:#8B85FF;--accent-bg:rgba(108,99,255,0.12);
  --green:#22C55E;--green-bg:rgba(34,197,94,0.12);
  --amber:#F59E0B;--amber-bg:rgba(245,158,11,0.12);
  --red:#EF4444;--red-bg:rgba(239,68,68,0.12);
  --blue:#3B82F6;--blue-bg:rgba(59,130,246,0.12);
  --purple:#A855F7;--purple-bg:rgba(168,85,247,0.12);
  --radius:12px;--radius-sm:8px;--radius-xs:6px;
}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
input,select,textarea{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-xs);color:var(--text);padding:9px 12px;font-family:'Inter',sans-serif;font-size:13px;outline:none;transition:border 0.2s;width:100%}
input:focus,select:focus,textarea:focus{border-color:var(--accent)}
input::placeholder,textarea::placeholder{color:var(--text3)}
select option{background:var(--bg2)}
button{cursor:pointer;font-family:'Inter',sans-serif}
.screen{display:none;position:fixed;inset:0;align-items:center;justify-content:center;background:var(--bg);z-index:10;padding:1rem}
.screen.active{display:flex}
.login-wrap{width:100%;max-width:420px}
.login-logo{text-align:center;margin-bottom:2rem}
.logo-icon{width:52px;height:52px;background:var(--accent);border-radius:14px;display:inline-flex;align-items:center;justify-content:center;font-size:22px;margin-bottom:12px;box-shadow:0 0 40px rgba(108,99,255,0.4)}
.logo-title{font-size:22px;font-weight:700;background:linear-gradient(135deg,#fff,#8B85FF);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.logo-sub{font-size:13px;color:var(--text2);margin-top:4px}
.login-card{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:2rem}
.role-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:1.25rem}
.role-btn{padding:12px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--bg3);cursor:pointer;text-align:left;transition:all 0.2s}
.role-btn:hover,.role-btn.selected{border-color:var(--accent);background:var(--accent-bg)}
.role-btn-icon{font-size:18px;margin-bottom:4px}
.role-btn-title{font-size:13px;font-weight:600}
.role-btn-sub{font-size:11px;color:var(--text2);margin-top:2px}
.role-btn-full{grid-column:1/-1}
.field{margin-bottom:12px}
.field label{display:block;font-size:12px;color:var(--text2);margin-bottom:5px;font-weight:500}
.pw-wrap{position:relative}
.pw-wrap input{padding-right:40px}
.pw-eye{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text2);font-size:15px;padding:0}
.btn-login{width:100%;padding:11px;background:var(--accent);border:none;border-radius:var(--radius-sm);color:#fff;font-weight:600;font-size:14px;transition:all 0.2s;margin-top:4px}
.btn-login:hover{background:var(--accent2);transform:translateY(-1px)}
.notice{padding:10px 12px;border-radius:var(--radius-xs);font-size:12px;margin-bottom:10px;display:none;align-items:center;gap:8px;line-height:1.5}
.notice-amber{background:var(--amber-bg);border:1px solid rgba(245,158,11,0.3);color:var(--amber)}
.notice-red{background:var(--red-bg);border:1px solid rgba(239,68,68,0.3);color:var(--red)}
.notice-green{background:var(--green-bg);border:1px solid rgba(34,197,94,0.3);color:var(--green)}
.notice-purple{background:var(--purple-bg);border:1px solid rgba(168,85,247,0.3);color:var(--purple)}
.notice-blue{background:var(--blue-bg);border:1px solid rgba(59,130,246,0.3);color:var(--blue)}
.app{display:none;position:fixed;inset:0;flex-direction:row}
.sidebar{width:220px;flex-shrink:0;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;height:100vh}
.sb-top{padding:1.25rem;border-bottom:1px solid var(--border)}
.sb-av{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:15px;margin-bottom:10px}
.sb-name{font-size:14px;font-weight:600}
.sb-role-txt{font-size:11px;color:var(--text2);margin-top:2px}
.sb-sheet{display:inline-flex;align-items:center;gap:4px;font-size:10px;padding:2px 8px;border-radius:20px;background:var(--green-bg);border:1px solid rgba(34,197,94,0.3);color:var(--green);font-weight:500;margin-top:6px}
.sb-sheet-off{background:var(--red-bg);border-color:rgba(239,68,68,0.3);color:var(--red)}
.sb-master{display:inline-flex;align-items:center;gap:4px;font-size:10px;padding:2px 8px;border-radius:20px;background:var(--amber-bg);border:1px solid rgba(245,158,11,0.3);color:var(--amber);font-weight:500;margin-top:4px}
.nav-item{display:flex;align-items:center;gap:10px;padding:8px 1rem;font-size:13px;cursor:pointer;color:var(--text2);margin:1px 8px;border-radius:var(--radius-xs);transition:all 0.15s;font-weight:500}
.nav-item:hover{background:var(--bg3);color:var(--text)}
.nav-item.active{background:var(--accent-bg);color:var(--accent);font-weight:600}
.nav-item i{font-size:16px;flex-shrink:0;width:18px;text-align:center}
.nav-section{font-size:10px;color:var(--text3);padding:1rem 1rem 0.35rem;text-transform:uppercase;letter-spacing:0.08em;font-weight:600}
.sb-footer{margin-top:auto;padding:1rem;border-top:1px solid var(--border)}
.btn-logout{width:100%;padding:8px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-xs);color:var(--text2);font-size:13px;display:flex;align-items:center;justify-content:center;gap:6px;transition:all 0.2s}
.btn-logout:hover{background:var(--red-bg);border-color:rgba(239,68,68,0.3);color:var(--red)}
.main{flex:1;overflow-y:auto;background:var(--bg);padding:1.75rem}
.main::-webkit-scrollbar{width:5px}
.main::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}
.page-header{margin-bottom:1.5rem}
.page-title{font-size:20px;font-weight:700;letter-spacing:-0.3px}
.page-sub{font-size:13px;color:var(--text2);margin-top:3px}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:1.25rem;margin-bottom:1rem}
.card-title{font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:1rem}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:1rem}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:1.25rem}
.metric{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:1.1rem}
.metric-label{font-size:12px;color:var(--text2);margin-bottom:6px;font-weight:500}
.metric-val{font-size:26px;font-weight:700;letter-spacing:-0.5px}
.metric-sub{font-size:11px;color:var(--text3);margin-top:4px}
.tag{display:inline-flex;align-items:center;font-size:11px;padding:3px 9px;border-radius:20px;font-weight:600}
.tag-green{background:var(--green-bg);color:var(--green);border:1px solid rgba(34,197,94,0.2)}
.tag-amber{background:var(--amber-bg);color:var(--amber);border:1px solid rgba(245,158,11,0.2)}
.tag-red{background:var(--red-bg);color:var(--red);border:1px solid rgba(239,68,68,0.2)}
.tag-blue{background:var(--blue-bg);color:var(--blue);border:1px solid rgba(59,130,246,0.2)}
.tag-gray{background:rgba(255,255,255,0.06);color:var(--text2);border:1px solid var(--border)}
.tag-accent{background:var(--accent-bg);color:var(--accent);border:1px solid rgba(108,99,255,0.2)}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:10px 12px;font-weight:600;color:var(--text3);border-bottom:1px solid var(--border);font-size:11px;text-transform:uppercase;letter-spacing:0.05em;white-space:nowrap}
td{padding:10px 12px;border-bottom:1px solid var(--border);color:var(--text);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,255,255,0.015)}
.btn{padding:7px 16px;border-radius:var(--radius-xs);font-size:13px;font-weight:500;border:1px solid var(--border);background:var(--bg3);color:var(--text);transition:all 0.15s}
.btn:hover{background:var(--bg4)}
.btn-primary{background:var(--accent);border-color:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent2)}
.btn-sm{padding:4px 12px;font-size:12px}
.btn-danger{background:var(--red-bg);border-color:rgba(239,68,68,0.3);color:var(--red)}
.form-row{display:flex;gap:10px}
.form-row .field{flex:1}
.field textarea{height:70px;resize:vertical}
.divider{border:none;border-top:1px solid var(--border);margin:1rem 0}
.chip-group{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1rem}
.chip{padding:5px 14px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:var(--bg3);color:var(--text2);transition:all 0.15s}
.chip.active{background:var(--accent-bg);color:var(--accent);border-color:rgba(108,99,255,0.4)}
.empty{text-align:center;padding:2.5rem;color:var(--text3);font-size:13px}
.overflow-auto{overflow:auto}
.overflow-auto::-webkit-scrollbar{height:4px}
.overflow-auto::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}
.prog-wrap{height:4px;background:var(--bg3);border-radius:10px;overflow:hidden;margin-top:5px}
.prog-fill{height:4px;border-radius:10px}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin 0.7s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
.fu-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:1.1rem;margin-bottom:8px}
.url-input-wrap{display:flex;gap:8px;align-items:center}
.url-input-wrap input{flex:1;font-family:monospace;font-size:12px}
.url-status{font-size:11px;padding:2px 8px;border-radius:10px}
.url-ok{background:var(--green-bg);color:var(--green)}
.url-empty{background:var(--amber-bg);color:var(--amber)}

</head>

    const res=await fetch(url);
    if(!res.ok)throw new Error('HTTP '+res.status);
    const text=await res.text();
    const json=JSON.parse(text.replace(/^[^(]+\(|\);?\s*$/g,''));
    const rows=json.table.rows;
    if(!rows||rows.length<1)return false;
    const newMembers=[],newPW={gm:{},direktur:{},manager:{},assman:{},sales:{}},newURLs={};
    rows.forEach((row,idx)=>{
      const c=row.c;
      if(!c||!c[0]||!c[1])return;
      // Kolom: 0=role, 1=nama, 2=project, 3=assman, 4=password, 5=script_url
      const role=String(c[0]?c[0].v||'':'').trim();
      const nama=String(c[1]?c[1].v||'':'').trim();
      const project=String(c[2]?c[2].v||'':'').trim();
      const assman=String(c[3]?c[3].v||'':'').trim();
      const pw=String(c[4]?c[4].v||'':'').trim();
      const scriptUrl=String(c[5]?c[5].v||'':'').trim();
      if(!role||!nama)return;
      newMembers.push({id:'cfg'+idx,nama,role,project,assman});
      if(pw&&newPW[role]!==undefined)newPW[role][nama]=pw;
      if(scriptUrl&&scriptUrl.startsWith('https://script.google.com')&&role==='assman')newURLs[nama]=scriptUrl;
    });
    if(newMembers.length>0){
      team={members:newMembers};
      passwords=newPW;
      assmanURLs={...DEF_URLS,...newURLs};
      localStorage.setItem('crm_team_cfg',JSON.stringify(team));
      localStorage.setItem('crm_pw_cfg',JSON.stringify(passwords));
      localStorage.setItem('crm_urls_cfg',JSON.stringify(assmanURLs));
      localStorage.setItem('crm_cfg_loaded','1');
      console.log('Config loaded:',newMembers.length,'members,',Object.keys(newURLs).length,'URLs');
      return true;
    }
    return false;
  }catch(e){
    console.warn('loadConfigFromSheet error:',e.message);
    return false;
  }
}

// ================================================================
// SHEET API
// ================================================================
async function callSheet(assmanNama, action, data={}){
  const url=getScriptURL(assmanNama);
  if(!url)return{success:false,message:`URL sheet ${assmanNama} belum didaftarkan. GM perlu set URL di Manajemen Tim.`};
  try{
    // Encode payload sebagai URL param untuk bypass CORS dari file:// lokal
    const payload=JSON.stringify({action,...data});
    const encoded=encodeURIComponent(payload);
    // Gunakan GET dengan parameter untuk getAll, POST untuk write operations
    if(action==='getAll'){
      const res=await fetch(url+'?action=getAll',{method:'GET'});
      return await res.json();
    } else {
      // Untuk write: gunakan fetch dengan mode no-cors tidak bisa dapat response
      // Solusi: encode sebagai URL param dan POST
      const res=await fetch(url,{
        method:'POST',
        body:payload,
        headers:{'Content-Type':'text/plain;charset=utf-8'}
      });
      return await res.json();
    }
  }catch(err){
    // Jika masih CORS error, coba via URL param
    try{
      const payload=JSON.stringify({action,...data});
      const res=await fetch(url+'?payload='+encodeURIComponent(payload),{method:'GET'});
      return await res.json();
    }catch(err2){
      return{success:false,message:'Gagal terhubung: '+err2.message+' (CORS error — pastikan Apps Script di-deploy dengan akses "Anyone")'};
    }
  }
}

async function fetchAssmanData(assmanNama){
  const result=await callSheet(assmanNama,'getAll');
  if(result.success&&result.data){
    const normalized=result.data.map(row=>{
      const r={...row};
      if(r['Kontak Konsumen']!==null&&r['Kontak Konsumen']!==undefined)
        r['Kontak Konsumen']=String(r['Kontak Konsumen']);
      return r;
    });
    sheetCache[assmanNama]=normalized;
    return normalized;
  }
  return sheetCache[assmanNama]||[];
}

async function fetchMyData(){
  if(currentRole==='sales'){
    const ass=getAssmanOfSales(currentName);
    await fetchAssmanData(ass);
  } else if(currentRole==='assman'){
    await fetchAssmanData(currentName);
  } else if(currentRole==='manager'){
    const assL=getAssmanForMgr(currentName);
    await Promise.all(assL.map(a=>fetchAssmanData(a.nama)));
  } else {
    // GM & Direktur: fetch semua assman yang punya URL
    const allAss=getAssmanNames().filter(a=>getScriptURL(a));
    await Promise.all(allAss.map(a=>fetchAssmanData(a)));
  }
}

function pct(a,b){return b===0?0:Math.round(a/b*100);}
function validateHP(hp){
  const c=String(hp||'').replace(/[\s\-\.\(\)]/g,'');
  if(!c)return{valid:false,reason:'Nomor tidak boleh kosong',clean:''};
  if(/[a-zA-Z]/.test(c))return{valid:false,reason:'Nomor tidak boleh mengandung huruf',clean:c};
  // Tolak jika diawali 8 tanpa 0 di depan
  if(c.startsWith('8'))return{valid:false,reason:'Nomor harus diawali 08, bukan 8. Contoh: 081234567890',clean:c};
  let norm=c;
  if(c.startsWith('+62'))norm='0'+c.slice(3);
  else if(c.startsWith('62')&&c.length>=11)norm='0'+c.slice(2);
  if(!/^08[0-9]{8,11}$/.test(norm))return{valid:false,reason:'Format salah. Gunakan: 08xx-xxxx-xxxx (10-13 digit)',clean:norm};
  return{valid:true,clean:norm};
}
function todayISO(){return new Date().toISOString().split('T')[0];}

// Normalisasi tanggal ke format yyyy-mm-dd
// Handle: "2026-05-21", "21/05/2026", "21-05-2026", Date object
function normTgl(tgl){
  if(!tgl)return '';
  if(tgl instanceof Date){
    return tgl.toISOString().split('T')[0];
  }
  const s=String(tgl).trim();
  if(!s)return '';
  // Format yyyy-mm-dd (sudah benar)
  if(/^\d{4}-\d{2}-\d{2}/.test(s))return s.substring(0,10);
  // Format dd/mm/yyyy atau dd-mm-yyyy
  const m=s.match(/^(\d{1,2})[\/-](\d{1,2})[\/-](\d{4})/);
  if(m)return m[3]+'-'+m[2].padStart(2,'0')+'-'+m[1].padStart(2,'0');
  return s;
}

// Cek apakah tanggal jadwal sudah lewat atau hari ini
function isTglDue(tgl){
  const n=normTgl(tgl);
  if(!n)return false;
  return n<=todayISO();
}

// Cek apakah tanggal segera (dalam 3 hari)
function isTglSoon(tgl){
  const n=normTgl(tgl);
  if(!n)return false;
  const diff=(new Date(n)-new Date())/(864e5);
  return diff>0&&diff<=3;
}
function formatTgl(iso){if(!iso)return'—';const[y,m,d]=iso.split('-');return`${d}/${m}/${y}`;}
function isDueToday(iso){return iso&&iso<=todayISO();}
function isDueSoon(iso){return isTglSoon(iso);}
function stag(s){
  const m={'Masih bisa di FU':'<span class="tag tag-green">● Masih bisa di FU</span>','Tidak bisa di FU':'<span class="tag tag-red">● Tidak bisa di FU</span>','Tidak minat apt':'<span class="tag tag-red">● Tidak minat</span>','Non prospek':'<span class="tag tag-gray">● Non prospek</span>'};
  return m[s]||`<span class="tag tag-amber">● ${s||'—'}</span>`;
}
function scoreP(r){
  let s=0;const iss=[];
  if(validateHP(String(r['Kontak Konsumen']||'')).valid)s+=25;else iss.push('Kontak tidak valid');
  if(r['Domisili Konsumen'])s+=10;else iss.push('Domisili kosong');
  if(r['Rentang Usia Konsumen']||r['Rentang Usia Konsu'])s+=5;
  if(r['Tujuan Pembelian Unit'])s+=10;else iss.push('Tujuan beli kosong');
  if(String(r['Keterangan']||'').length>5)s+=20;else iss.push('Keterangan minim');
  if(r['Status Konsumen']&&r['Status Konsumen']!=='Masih bisa di FU')s+=10;
  if(r['Minat Unit'])s+=10;else iss.push('Minat unit kosong');
  const g=s>=80?'A':s>=60?'B':s>=35?'C':'D';
  return{score:s,grade:g,issues:iss};
}
function qtag(g){const c={A:'tag-green',B:'tag-blue',C:'tag-amber',D:'tag-red'}[g]||'tag-gray';return`<span class="tag ${c}">${g}</span>`;}
function gcol(g){return{A:'var(--green)',B:'var(--blue)',C:'var(--amber)',D:'var(--red)'}[g]||'var(--text2)';}

function normK(hp){return String(hp||'').replace(/[\s\-\.]/g,'');}

function cekHP(){
  const hp=document.getElementById('f-kontak').value;
  const badge=document.getElementById('hp-badge');
  const detail=document.getElementById('hp-detail');
  const btn=document.getElementById('btn-simpan');
  ['n-dup','n-dup2','n-hp'].forEach(id=>{const e=document.getElementById(id);if(e){e.style.display='none';e.style.background='';e.style.borderColor='';e.style.color='';}});
  if(!hp){badge.innerHTML='';detail.textContent='';if(btn){btn.disabled=false;btn.style.opacity='1';}return;}
  const v=validateHP(hp);
  if(!v.valid){
    badge.innerHTML='<span class="tag tag-red" style="font-size:10px">✗ Tidak valid</span>';
    detail.textContent=v.reason;detail.style.color='var(--red)';
    const nHP=document.getElementById('n-hp');
    nHP.style.display='flex';nHP.innerHTML=`🚫 ${v.reason}`;
    if(btn){btn.disabled=true;btn.style.opacity='0.4';}
    return;
  }
  badge.innerHTML='<span class="tag tag-green" style="font-size:10px">✓ Valid</span>';
  detail.textContent='Format valid';detail.style.color='var(--green)';

  const ass=getAssmanOfSales(currentName);
  const allAssData=getSheetData(ass);
  const myData=allAssData.filter(r=>r['Nama Sales Executives']===currentName);
  const cleanNew=normK(v.clean);

  // Cek duplikat dari sales yang SAMA — BLOKIR
  const dupMe=myData.find(r=>normK(String(r['Kontak Konsumen']||''))===cleanNew);
  // Cek duplikat dari sales LAIN di assman yang sama — peringatan saja
  const dupOther=allAssData.filter(r=>r['Nama Sales Executives']!==currentName&&normK(String(r['Kontak Konsumen']||''))===cleanNew);

  if(dupMe){
    const nDup=document.getElementById('n-dup');
    nDup.style.display='flex';
    nDup.style.background='var(--red-bg)';
    nDup.style.borderColor='rgba(239,68,68,0.5)';
    nDup.style.color='var(--red)';
    nDup.innerHTML=`🚫 <strong>DUPLIKAT!</strong> Nomor ini sudah Anda input atas nama <strong>${dupMe['Nama Konsumen']}</strong>. Tidak bisa disimpan lagi.`;
    if(btn){btn.disabled=true;btn.style.opacity='0.4';}
  } else {
    if(btn){btn.disabled=false;btn.style.opacity='1';}
    if(dupOther.length){
      const nDup2=document.getElementById('n-dup2');
      nDup2.style.display='flex';
      nDup2.innerHTML=`ℹ️ Nomor ini juga ada di sales lain: ${dupOther.map(r=>`<strong>${r['Nama Konsumen']}</strong> (${r['Nama Sales Executives']})`).join(', ')} — Anda tetap bisa simpan.`;
    }
  }
}

async function simpanProspek(){
  const nama=document.getElementById('f-nama').value.trim();
  const kontak=document.getElementById('f-kontak').value.trim();
  const sumber=document.getElementById('f-sumber').value;
  if(!nama||!kontak||!sumber){alert('Lengkapi field wajib: Nama, Kontak, Sumber.');return;}
  const v=validateHP(kontak);
  if(!v.valid){alert('Nomor tidak valid: '+v.reason);return;}
  const ass=getAssmanOfSales(currentName);
  const allAssData=getSheetData(ass);
  const myData=allAssData.filter(r=>r['Nama Sales Executives']===currentName);
  // Double-check duplikat saat simpan — layer pertahanan kedua
  if(myData.find(r=>normK(String(r['Kontak Konsumen']||''))===normK(v.clean))){
    alert('🚫 DUPLIKAT! Nomor ini sudah pernah Anda input. Tidak bisa disimpan.');return;
  }
  const btn=document.getElementById('btn-simpan');
  btn.innerHTML='<span class="spinner"></span>Menyimpan...';btn.disabled=true;
  const result=await callSheet(ass,'addProspek',{
    namaSales:currentName,namaKonsumen:nama,kontakKonsumen:kontak,
    sumberKonsumen:sumber,statusKonsumen:document.getElementById('f-status').value,
    minatUnit:document.getElementById('f-minat').value,
    keterangan:document.getElementById('f-ket').value,
    jadwalFU:document.getElementById('f-jadwal')?document.getElementById('f-jadwal').value:'',
    domisili:document.getElementById('f-dom').value,
    rentangUsia:document.getElementById('f-usia').value,
    penghasilan:document.getElementById('f-penghasilan')?document.getElementById('f-penghasilan').value:'',
    tujuanPembelian:document.getElementById('f-tujuan').value,
    keterangan2:document.getElementById('f-ket2').value,
  });
  btn.innerHTML=`📤 Simpan ke Sheet ${ass}`;btn.disabled=false;
  if(result.success){
    document.getElementById('n-ok').style.display='flex';
    document.getElementById('n-ok').innerHTML=`✅ ${result.message} (baris ${result.rowAdded})`;
    setTimeout(()=>document.getElementById('n-ok').style.display='none',5000);
    resetForm();await fetchAssmanData(ass);
  } else {
    document.getElementById('n-err').style.display='flex';
    document.getElementById('n-err').innerHTML='❌ '+result.message;
  }
}

    const jadwal=(document.getElementById('fu-jadwal-'+i)||{value:''}).value;

    const ket=(document.getElementById('fu-ket-'+i)||{value:''}).value;
    const dok=(document.getElementById('fu-dok-'+i)||{value:''}).value;
    const ass=getAssmanOfSales(currentName);
    // Tampilkan loading di tombol
    const btn=document.querySelector('.fu-simpan-btn[data-i="'+i+'"]');
    if(btn){btn.innerHTML='<span class="spinner"></span>';btn.disabled=true;}
    // Update lokal cache
    const cidx=sheetCache[ass]?sheetCache[ass].findIndex(r=>normK(String(r['Kontak Konsumen']||''))===normK(kontak)&&r['Nama Sales Executives']===currentName):-1;
    if(cidx>=0){
      sheetCache[ass][cidx]['Jadwal FU']=jadwal;
      sheetCache[ass][cidx]['Status Konsumen']=status;
      sheetCache[ass][cidx]['Keterangan']=ket;
      sheetCache[ass][cidx]['Keterangan2']=dok;
    }
    // Kirim ke sheet
    const result=await callSheet(ass,'updateProspek',{
      kontakKonsumen:kontak,namaSales:currentName,
      statusKonsumen:status,jadwalFU:jadwal,
      keterangan:ket,dokumen:dok
    });
    if(btn){btn.innerHTML='💾 Simpan';btn.disabled=false;}
    const ok=document.getElementById('fu-ok-'+i);
    const err=document.getElementById('fu-err-'+i);
    if(result&&result.success){
      if(ok){ok.style.display='flex';setTimeout(()=>{if(ok)ok.style.display='none';},3000);}
    } else {
      if(err){err.style.display='flex';err.innerHTML='❌ '+(result?result.message:'Gagal simpan');setTimeout(()=>{if(err)err.style.display='none';},5000);}
    }
  }catch(e){
    console.error('updateFU error:',e);
    const err=document.getElementById('fu-err-'+i);
    if(err){err.style.display='flex';err.innerHTML='❌ Error: '+e.message;setTimeout(()=>{if(err)err.style.display='none';},5000);}
  }
}

function pgQ(data){
  const scored=data.map(r=>({...r,...scoreP(r)}));
  const grades={A:0,B:0,C:0,D:0};scored.forEach(p=>grades[p.grade]++);
  const avgS=scored.length?Math.round(scored.reduce((a,b)=>a+b.score,0)/scored.length):0;
  const validHp=scored.filter(p=>validateHP(String(p['Kontak Konsumen']||'')).valid).length;
  const hasKet=scored.filter(p=>String(p['Keterangan']||'').length>5).length;
  const hasDom=scored.filter(p=>p['Domisili Konsumen']).length;
  const hasTujuan=scored.filter(p=>p['Tujuan Pembelian Unit']).length;
  document.getElementById('main').innerHTML=`${ph('Kualitas Database','Penilaian otomatis berdasarkan kelengkapan data')}
  <div class="grid4">${mcrd('Rata-rata Skor',avgS+'%',avgS>=70?'var(--green)':avgS>=50?'var(--amber)':'var(--red)','','📊')}${mcrd('Kontak Valid',validHp+'/'+scored.length,'var(--blue)','','📱')}${mcrd('Keterangan Terisi',hasKet+'/'+scored.length,'var(--purple)','','📝')}${mcrd('Domisili Terisi',hasDom+'/'+scored.length,'var(--green)','','🏠')}</div>
  <div class="grid2">
    <div class="card"><div class="card-title">Distribusi Grade</div>
      ${['A','B','C','D'].map(g=>{const cnt=grades[g];const prc=pct(cnt,scored.length||1);const cols={A:'var(--green)',B:'var(--blue)',C:'var(--amber)',D:'var(--red)'};return`<div style="display:flex;align-items:center;gap:12px;margin-bottom:12px"><div style="width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:800;background:${cols[g]}22;color:${cols[g]};border:2px solid ${cols[g]};flex-shrink:0">${g}</div><div style="flex:1"><div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px"><span style="font-weight:500">Grade ${g}</span><span style="color:var(--text2)">${cnt} (${prc}%)</span></div><div class="prog-wrap"><div class="prog-fill" style="width:${prc}%;background:${cols[g]}"></div></div></div></div>`;}).join('')}
    </div>
    <div class="card"><div class="card-title">Komponen penilaian</div>
      ${[['📱 Kontak valid (25)',validHp],['🏠 Domisili (10)',hasDom],['🎯 Minat unit (10)',scored.filter(p=>p['Minat Unit']).length],['📝 Keterangan (20)',hasKet],['🛒 Tujuan beli (10)',hasTujuan],['📊 Usia (5)',scored.filter(p=>p['Rentang Usia Konsumen']||p['Rentang Usia Konsu']).length]].map(([l,v])=>`<div style="display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border)"><span style="font-size:13px">${l}</span><span style="font-size:13px;color:var(--blue);font-weight:600">${v}/${scored.length}</span></div>`).join('')}
    </div>
  </div>
  <div class="card"><div class="card-title">Prioritas perbaikan (Grade C & D)</div>
    <div class="overflow-auto"><table><thead><tr><th>Nama</th><th>Sales</th><th>Kontak</th><th>Grade</th><th>Skor</th><th>Masalah</th></tr></thead>
    <tbody>${scored.filter(p=>p.grade==='D'||p.grade==='C').sort((a,b)=>a.score-b.score).slice(0,20).map(p=>`<tr>
      <td style="font-weight:600">${p['Nama Konsumen']||'—'}</td><td>${p['Nama Sales Executives']||'—'}</td>
      <td style="font-size:12px;color:var(--text2)">${p['Kontak Konsumen']||'—'}</td>
      <td>${qtag(p.grade)}</td><td><span style="font-weight:700;color:${gcol(p.grade)}">${p.score}</span></td>
      <td style="font-size:12px;color:var(--text2)">${p.issues.slice(0,2).join(' · ')||'—'}</td>
    </tr>`).join('')||'<tr><td colspan="6" class="empty">Semua data kualitas baik! 🎉</td></tr>'}
    </tbody></table></div>
  </div>`;
}

let cTab='manager';
function timTab(el,r){cTab=r;document.querySelectorAll('#main .chip').forEach(c=>c.classList.remove('active'));el.classList.add('active');renderTimTab(r);const b=document.getElementById('tim-add-btn');if(b){b.textContent=`+ Tambah ${ROLE_LABEL[r]||r}`;b.onclick=()=>openModal(r,'');}}
function renderTimTab(r){

let editId=null;
let chartInstances={};
function openModal(role,assNama){editId=null;showModal('Tambah Anggota',role,'','',assNama);}
function openEditModal(id){const m=(team.members||[]).find(x=>x.id===id);if(!m)return;editId=id;showModal('Ubah Anggota',m.role,m.nama,m.project.split(',')[0]||'',m.assman);}
function showModal(title,role,nama,proj,assNama){
  const ex=document.getElementById('modal-overlay');if(ex)ex.remove();
  const div=document.createElement('div');div.id='modal-overlay';
  div.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:100;display:flex;align-items:center;justify-content:center;padding:1rem';
  div.innerHTML=`<div style="background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:1.75rem;width:480px;max-width:100%">
    <div style="font-size:16px;font-weight:700;margin-bottom:1.25rem">${title}</div>
    <div class="field"><label>Nama *</label><input type="text" id="m-nama" value="${nama}" placeholder="Nama anggota"></div>
    <div class="form-row">
      <div class="field"><label>Role *</label><select id="m-role" onchange="onMRole()"><option value="">--</option><option value="sales" ${role==='sales'?'selected':''}>Sales</option><option value="assman" ${role==='assman'?'selected':''}>Asst. Manager</option><option value="manager" ${role==='manager'?'selected':''}>Manager</option></select></div>
      <div class="field"><label>Project *</label><select id="m-proj"><option value="">--</option><option value="WBL" ${proj==='WBL'?'selected':''}>WBL</option><option value="KBA" ${proj==='KBA'?'selected':''}>KBA</option><option value="FST" ${proj==='FST'?'selected':''}>FST</option></select></div>
    </div>
    <div class="field" id="m-ass-w" style="${role==='sales'?'':'display:none'}"><label>Assman atasan *</label>
      <select id="m-assman"><option value="">--</option>${getAssmanNames().map(n=>`<option ${n===assNama?'selected':''}>${n}</option>`).join('')}</select>
    </div>
    <div class="field"><label>Password awal</label><input type="text" id="m-pw" placeholder="Kosong = default (sales123/assman123)"></div>
    <div id="m-notice" class="notice notice-red" style="margin-top:8px"></div>
    <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:1rem">
      <button class="btn" onclick="closeModal()">Batal</button>
      <button class="btn btn-primary" onclick="simpanAnggota()">💾 Simpan</button>
    </div>
  </div>`;
  document.body.appendChild(div);
}
function onMRole(){const r=document.getElementById('m-role').value;const w=document.getElementById('m-ass-w');if(w)w.style.display=r==='sales'?'block':'none';}
function closeModal(){const el=document.getElementById('modal-overlay');if(el)el.remove();editId=null;}
function simpanAnggota(){
  const nama=document.getElementById('m-nama').value.trim();const role=document.getElementById('m-role').value;const proj=document.getElementById('m-proj').value;const pw=document.getElementById('m-pw').value.trim();
  const mn=document.getElementById('m-notice');mn.style.display='none';
  if(!nama||!role||!proj){mn.style.display='flex';mn.innerHTML='⚠️ Lengkapi field wajib.';return;}
  if(role==='sales'&&!(document.getElementById('m-assman').value)){mn.style.display='flex';mn.innerHTML='⚠️ Pilih assman atasan.';return;}
  if(editId){
    const m=(team.members||[]).find(x=>x.id===editId);if(!m)return;
    const oldN=m.nama;const oldR=m.role;
    if(oldN!==nama){if(passwords[oldR]&&passwords[oldR][oldN]){const op=passwords[oldR][oldN];delete passwords[oldR][oldN];if(!passwords[role])passwords[role]={};passwords[role][nama]=pw||op;}(team.members||[]).forEach(s=>{if(s.role==='sales'&&s.assman===oldN)s.assman=nama;});}
    m.nama=nama;m.role=role;m.project=proj;if(role==='sales')m.assman=document.getElementById('m-assman').value;
    if(pw){if(!passwords[role])passwords[role]={};passwords[role][nama]=pw;}
  } else {
    if((team.members||[]).find(x=>x.nama===nama&&x.role===role)){mn.style.display='flex';mn.innerHTML='⚠️ Nama sudah terdaftar.';return;}
    (team.members||(team.members=[])).push({id:genId(),nama,role,project:proj,assman:role==='sales'?(document.getElementById('m-assman').value):''});
    if(!passwords[role])passwords[role]={};passwords[role][nama]=pw||(role==='sales'?'sales123':role==='assman'?'assman123':'password123');
  }
  save();closeModal();if(document.getElementById('tim-content'))renderTimTab(cTab);
}
function hapusMember(id){const m=(team.members||[]).find(x=>x.id===id);if(!m)return;if(!confirm(`Hapus ${m.nama}?`))return;team.members=team.members.filter(x=>x.id!==id);save();if(document.getElementById('tim-content'))renderTimTab(cTab);}

    <p style="font-size:13px;color:var(--text2);margin-bottom:1rem;line-height:1.6">Ubah password di sini, lalu <strong style="color:var(--text)">Export Settings</strong> → kirim file ke device lain → <strong style="color:var(--text)">Import Settings</strong> di device lain. Semua password & URL sheet langsung tersync.</p>
    <div style="display:flex;gap:10px;flex-wrap:wrap">
      <button class="btn btn-primary" onclick="exportSettings()"><i class="ti ti-download"></i> Export Settings</button>
      <button class="btn" onclick="document.getElementById('import-file').click()"><i class="ti ti-upload"></i> Import Settings</button>
      <input type="file" id="import-file" accept=".json" style="display:none" onchange="importSettings(this)">
    </div>
    <div id="sync-ok" class="notice notice-green" style="margin-top:10px;display:none"></div>
    <div id="sync-err" class="notice notice-red" style="margin-top:10px;display:none"></div>
  </div>

  <!-- PASSWORD FIELDS -->
  <div class="card"><div class="card-title">Password GM</div>${rAdmGrp('gm',['GM'])}</div>
  <div class="card"><div class="card-title">Password Manager</div>${rAdmGrp('manager',getMgrNames())}</div>
  <div class="card"><div class="card-title">Password Sales</div>${rAdmGrp('sales',getSalesNames())}</div>

  <div class="card"><div class="card-title">Password Direktur</div>${rAdmGrp('direktur',['Direktur Marketing'])}</div>
  <div id="adm-ok" class="notice notice-green" style="display:none;margin-top:10px"></div>`;
}

function exportSettings(){
  const data={
    _info:'CRM Property Settings — Export dari mpls-db.netlify.app',
    _tanggal:new Date().toLocaleString('id-ID'),
    passwords,
    assmanURLs,
    team
  };
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download='CRM_Settings_'+new Date().toISOString().split('T')[0]+'.json';
  document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
  const ok=document.getElementById('sync-ok');
  ok.style.display='flex';ok.innerHTML='✅ Settings berhasil di-export! Kirim file ini ke device lain lalu klik Import.';
  setTimeout(()=>ok.style.display='none',5000);
}

function importSettings(input){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=function(e){
    try{
      const data=JSON.parse(e.target.result);
      if(!data.passwords&&!data.assmanURLs){throw new Error('Format file tidak valid.');}
      if(data.passwords)passwords=data.passwords;
      if(data.assmanURLs)assmanURLs={...DEF_URLS,...data.assmanURLs};
      if(data.team)team=data.team;
      save();
      const ok=document.getElementById('sync-ok');
      ok.style.display='flex';ok.innerHTML='✅ Settings berhasil di-import! Semua password & URL sheet sudah tersync.';
      setTimeout(()=>{ok.style.display='none';pgAdmin();},3000);
    }catch(err){
      const er=document.getElementById('sync-err');
      er.style.display='flex';er.innerHTML='❌ Gagal import: '+err.message;
      setTimeout(()=>er.style.display='none',5000);
    }
  };
  reader.readAsText(file);
  input.value='';
}

function rAdmGrp(role,names){return`<div>${names.map(n=>`<div style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)">
  <div style="width:160px;font-size:13px;font-weight:600">${n}</div>
  <div style="flex:1;position:relative"><input type="password" id="adm-${role}-${n.replace(/[\s]/g,'_')}" value="${(passwords[role]||{})[n]||''}" style="padding-right:36px">
  <button class="pw-eye" onclick="tglPW('adm-${role}-${n.replace(/[\s]/g,'_')}',this)"><i class="ti ti-eye"></i></button></div>
  <button class="btn btn-sm btn-primary" style="flex-shrink:0" onclick="admSave('${role}','${n}')">Simpan</button>
</div>`).join('')}</div>`;}
function admSave(role,name){const key='adm-'+role+'-'+name.replace(/[\s]/g,'_');const el=document.getElementById(key);if(!el){alert('Field tidak ditemukan.');return;}const newPw=el.value.trim();if(!newPw){alert('Tidak boleh kosong.');return;}if(!passwords[role])passwords[role]={};passwords[role][name]=newPw;save();const ok=document.getElementById('adm-ok');if(ok){ok.style.display='flex';ok.innerHTML=`✅ Password <strong>${name}</strong> diubah!`;setTimeout(()=>ok.style.display='none',3000);}}

async function refreshAndGo(page){
  // Tampilkan feedback loading di tombol jika ada
  const btns=document.querySelectorAll('[onclick*="refreshAndGo"]');
  btns.forEach(b=>{b._orig=b.innerHTML;b.innerHTML='<span class="spinner"></span> Memuat...';b.disabled=true;});
  try{
    await fetchMyData();
  } catch(e){
    console.error('Refresh error:',e);
  }
  btns.forEach(b=>{if(b._orig){b.innerHTML=b._orig;b.disabled=false;}});
  goPage(page);
}
